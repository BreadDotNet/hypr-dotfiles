"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](surface)\
$os\
$username\
[](bg:dim fg:surface)\
$directory\
[](fg:dim bg:border)\
$git_branch\
$git_status\
[](fg:border bg:fg)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:fg bg:strong)\
$docker_context\
[](fg:strong bg:intense)\
$time\
[ ](fg:intense)\
$line_break$character"""

palette = 'e_ink_dark'

add_newline = false

[palettes.e_ink_dark]
# Mono greyscale (from e-ink.nvim dark palette)
mono1 = "#333333"
mono2 = "#474747"
mono3 = "#4A4A4A"
mono4 = "#545454"
mono5 = "#5E5E5E"
mono6 = "#686868"
mono7 = "#727272"
mono8 = "#7C7C7C"
mono9 = "#868686"
mono10 = "#909090"
mono11 = "#9A9A9A"
mono12 = "#A4A4A4"
mono13 = "#AEAEAE"
mono14 = "#B8B8B8"
mono15 = "#C2C2C2"
mono16 = "#CCCCCC"
# Everforest accents (used sparingly)
red = "#E67E80"
yellow = "#DBBC7F"
green = "#A7C080"
blue = "#7FBBB3"
aqua = "#83C092"
purple = "#D699B6"
orange = "#E69875"
# Semantic aliases
bg = "#333333"
surface = "#474747"
overlay = "#545454"
faint = "#5E5E5E"
dim = "#686868"
muted = "#727272"
subtle = "#7C7C7C"
border = "#868686"
secondary = "#909090"
tertiary = "#9A9A9A"
fg = "#A4A4A4"
emphasis = "#AEAEAE"
strong = "#B8B8B8"
bright = "#C2C2C2"
intense = "#CCCCCC"
error = "#E67E80"
warning = "#DBBC7F"
ok = "#A7C080"
info = "#83C092"
hint = "#7FBBB3"
search = "#E69875"

[palettes.e_ink_light]
# Mono greyscale (from e-ink.nvim light palette)
mono1 = "#CCCCCC"
mono2 = "#C2C2C2"
mono3 = "#B8B8B8"
mono4 = "#AEAEAE"
mono5 = "#A4A4A4"
mono6 = "#9A9A9A"
mono7 = "#909090"
mono8 = "#868686"
mono9 = "#7C7C7C"
mono10 = "#727272"
mono11 = "#686868"
mono12 = "#5E5E5E"
mono13 = "#545454"
mono14 = "#4A4A4A"
mono15 = "#474747"
mono16 = "#333333"
# Everforest accents (light variants)
red = "#F85552"
yellow = "#DFA000"
green = "#8DA101"
blue = "#3A94C5"
aqua = "#35A77C"
purple = "#DF69BA"
orange = "#F57D26"
# Semantic aliases
bg = "#CCCCCC"
surface = "#C2C2C2"
overlay = "#AEAEAE"
faint = "#A4A4A4"
dim = "#9A9A9A"
muted = "#909090"
subtle = "#868686"
border = "#7C7C7C"
secondary = "#727272"
tertiary = "#686868"
fg = "#5E5E5E"
emphasis = "#545454"
strong = "#4A4A4A"
bright = "#474747"
intense = "#333333"
error = "#F85552"
warning = "#DFA000"
ok = "#8DA101"
info = "#35A77C"
hint = "#3A94C5"
search = "#F57D26"

[os]
disabled = false
style = "bg:surface fg:intense"

[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = ""
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
Arch = "󰣇"
Artix = "󰣇"
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"

[username]
show_always = true
style_user = "bg:surface fg:intense"
style_root = "bg:surface fg:error"
format = '[ $user ]($style)'

[directory]
style = "fg:bg bg:dim"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

[git_branch]
symbol = ""
style = "bg:border"
format = '[[ $symbol $branch ](fg:bg bg:border)]($style)'

[git_status]
style = "bg:border"
format = '[[($all_status$ahead_behind )](fg:bg bg:border)]($style)'
ahead = "[⇡${count}](fg:ok bg:border)"
behind = "[⇣${count}](fg:search bg:border)"
diverged = "[⇕⇡${ahead_count}⇣${behind_count}](fg:warning bg:border)"
modified = "[!${count}](fg:warning bg:border)"
staged = "[+${count}](fg:ok bg:border)"
deleted = "[-${count}](fg:error bg:border)"
untracked = "[?${count}](fg:hint bg:border)"
conflicted = "[=${count}](fg:error bg:border)"

[nodejs]
symbol = ""
style = "bg:fg"
format = '[[ $symbol( $version) ](fg:bg bg:fg)]($style)'

[c]
symbol = " "
style = "bg:fg"
format = '[[ $symbol( $version) ](fg:bg bg:fg)]($style)'

[rust]
symbol = ""
style = "bg:fg"
format = '[[ $symbol( $version) ](fg:bg bg:fg)]($style)'

[golang]
symbol = ""
style = "bg:fg"
format = '[[ $symbol( $version) ](fg:bg bg:fg)]($style)'

[php]
symbol = ""
style = "bg:fg"
format = '[[ $symbol( $version) ](fg:bg bg:fg)]($style)'

[java]
symbol = " "
style = "bg:fg"
format = '[[ $symbol( $version) ](fg:bg bg:fg)]($style)'

[kotlin]
symbol = ""
style = "bg:fg"
format = '[[ $symbol( $version) ](fg:bg bg:fg)]($style)'

[haskell]
symbol = ""
style = "bg:fg"
format = '[[ $symbol( $version) ](fg:bg bg:fg)]($style)'

[python]
symbol = ""
style = "bg:fg"
format = '[[ $symbol( $version) ](fg:bg bg:fg)]($style)'

[docker_context]
symbol = ""
style = "bg:strong"
format = '[[ $symbol( $context) ](fg:bg bg:strong)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:intense"
format = '[[  $time ](fg:bg bg:intense)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[~](bold fg:ok)'
error_symbol = '[~](bold fg:error)'
vimcmd_symbol = '[~](bold fg:ok)'
vimcmd_replace_one_symbol = '[~](bold fg:purple)'
vimcmd_replace_symbol = '[~](bold fg:purple)'
vimcmd_visual_symbol = '[~](bold fg:hint)'
