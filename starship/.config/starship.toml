"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](mono3)\
$os\
$username\
[](bg:mono6 fg:mono3)\
$directory\
[](fg:mono6 bg:mono9)\
$git_branch\
$git_status\
[](fg:mono9 bg:mono12)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:mono12 bg:mono14)\
$docker_context\
[](fg:mono14 bg:mono16)\
$time\
[ ](fg:mono16)\
$line_break$character"""

palette = 'e_ink_dark'

add_newline = false

[palettes.e_ink_dark]
# Mono greyscale (from e-ink.nvim dark palette)
mono1 = "#333333"
mono2 = "#474747"
mono3 = "#4A4A4A"
mono4 = "#545454"
mono5 = "#5E5E5E"
mono6 = "#686868"
mono7 = "#727272"
mono8 = "#7C7C7C"
mono9 = "#868686"
mono10 = "#909090"
mono11 = "#9A9A9A"
mono12 = "#A4A4A4"
mono13 = "#AEAEAE"
mono14 = "#B8B8B8"
mono15 = "#C2C2C2"
mono16 = "#CCCCCC"
# Everforest accents (used sparingly)
red = "#E67E80"
yellow = "#DBBC7F"
green = "#A7C080"
blue = "#7FBBB3"
aqua = "#83C092"
purple = "#D699B6"
orange = "#E69875"

[palettes.e_ink_light]
# Mono greyscale (from e-ink.nvim light palette)
mono1 = "#CCCCCC"
mono2 = "#C2C2C2"
mono3 = "#B8B8B8"
mono4 = "#AEAEAE"
mono5 = "#A4A4A4"
mono6 = "#9A9A9A"
mono7 = "#909090"
mono8 = "#868686"
mono9 = "#7C7C7C"
mono10 = "#727272"
mono11 = "#686868"
mono12 = "#5E5E5E"
mono13 = "#545454"
mono14 = "#4A4A4A"
mono15 = "#474747"
mono16 = "#333333"
# Everforest accents (light variants)
red = "#F85552"
yellow = "#DFA000"
green = "#8DA101"
blue = "#3A94C5"
aqua = "#35A77C"
purple = "#DF69BA"
orange = "#F57D26"

[os]
disabled = false
style = "bg:mono3 fg:mono16"

[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = ""
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
Arch = "󰣇"
Artix = "󰣇"
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"

[username]
show_always = true
style_user = "bg:mono3 fg:mono16"
style_root = "bg:mono3 fg:red"
format = '[ $user ]($style)'

[directory]
style = "fg:mono1 bg:mono6"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

[git_branch]
symbol = ""
style = "bg:mono9"
format = '[[ $symbol $branch ](fg:mono1 bg:mono9)]($style)'

[git_status]
style = "bg:mono9"
format = '[[($all_status$ahead_behind )](fg:mono1 bg:mono9)]($style)'
ahead = "[⇡${count}](fg:green bg:mono9)"
behind = "[⇣${count}](fg:orange bg:mono9)"
diverged = "[⇕⇡${ahead_count}⇣${behind_count}](fg:yellow bg:mono9)"
modified = "[!${count}](fg:yellow bg:mono9)"
staged = "[+${count}](fg:green bg:mono9)"
deleted = "[-${count}](fg:red bg:mono9)"
untracked = "[?${count}](fg:blue bg:mono9)"
conflicted = "[=${count}](fg:red bg:mono9)"

[nodejs]
symbol = ""
style = "bg:mono12"
format = '[[ $symbol( $version) ](fg:mono1 bg:mono12)]($style)'

[c]
symbol = " "
style = "bg:mono12"
format = '[[ $symbol( $version) ](fg:mono1 bg:mono12)]($style)'

[rust]
symbol = ""
style = "bg:mono12"
format = '[[ $symbol( $version) ](fg:mono1 bg:mono12)]($style)'

[golang]
symbol = ""
style = "bg:mono12"
format = '[[ $symbol( $version) ](fg:mono1 bg:mono12)]($style)'

[php]
symbol = ""
style = "bg:mono12"
format = '[[ $symbol( $version) ](fg:mono1 bg:mono12)]($style)'

[java]
symbol = " "
style = "bg:mono12"
format = '[[ $symbol( $version) ](fg:mono1 bg:mono12)]($style)'

[kotlin]
symbol = ""
style = "bg:mono12"
format = '[[ $symbol( $version) ](fg:mono1 bg:mono12)]($style)'

[haskell]
symbol = ""
style = "bg:mono12"
format = '[[ $symbol( $version) ](fg:mono1 bg:mono12)]($style)'

[python]
symbol = ""
style = "bg:mono12"
format = '[[ $symbol( $version) ](fg:mono1 bg:mono12)]($style)'

[docker_context]
symbol = ""
style = "bg:mono14"
format = '[[ $symbol( $context) ](fg:mono1 bg:mono14)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:mono16"
format = '[[  $time ](fg:mono1 bg:mono16)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[~](bold fg:green)'
error_symbol = '[~](bold fg:red)'
vimcmd_symbol = '[~](bold fg:green)'
vimcmd_replace_one_symbol = '[~](bold fg:purple)'
vimcmd_replace_symbol = '[~](bold fg:purple)'
vimcmd_visual_symbol = '[~](bold fg:blue)'
