# E-ink palette for tmux (dark mode) -- AUTO-GENERATED by theme/generate.sh

# Pane borders
set -g pane-border-style fg=#545454
set -g pane-active-border-style fg=#A7C080

# Status bar
set -g status-style bg=default,fg=#A4A4A4
set -g status-left ""
set -g status-right "#[fg=#727272]#S"

# Window list
set -g window-status-format "#[fg=#727272] #I #W "
set -g window-status-current-format "#[fg=#A7C080,bold] #I #W "
set -g window-status-separator ""

# Messages & command line
set -g message-style bg=#333333,fg=#C2C2C2
set -g message-command-style bg=#333333,fg=#C2C2C2

# Mode (copy mode, etc.)
set -g mode-style bg=#545454,fg=#C2C2C2
